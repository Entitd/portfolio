openapi: 3.0.3

info:
  title: Portfolio Contact API
  version: 1.1.0
  description: >
    REST API лендинга PHP / Backend-разработчика. API принимает обращения,
    сохраняет их, выполняет AI-анализ и отправляет email-уведомления.

servers:
  - url: /
    description: Текущий хост

tags:
  - name: Contact
    description: Форма обратной связи
  - name: System
    description: Состояние сервиса и статистика

paths:
  /api/contact:
    post:
      tags: [Contact]
      summary: Отправить обращение
      description: >
        Нормализует и валидирует данные, сохраняет обращение, выполняет AI-анализ,
        отправляет письмо владельцу сайта и копию пользователю. Endpoint защищён
        rate limiting по IP.
      operationId: createContact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactRequest'
            examples:
              project:
                summary: Запрос на разработку проекта
                value:
                  name: Иван Петров
                  email: ivan@example.com
                  phone: '+79991234567'
                  comment: Хочу обсудить разработку нового проекта
      responses:
        '201':
          description: Обращение обработано
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactCreatedResponse'
              example:
                message: Обращение успешно принято.
                data:
                  id: 1
                  request_id: 8bb2c0d4-9710-4d15-a6b7-45e28e708f35
                  ai:
                    answer: Спасибо за обращение! Я ознакомился с описанием проекта и скоро свяжусь с вами.
                    category: project
                    sentiment: positive
                    status: success
        '422':
          description: Ошибка валидации
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                message: Validation failed.
                error:
                  status: 422
                  type: ValidationException
                errors:
                  email:
                    - Укажите корректный email.
        '429':
          description: Превышен лимит запросов
          headers:
            Retry-After:
              description: Число секунд до следующей попытки
              schema:
                type: integer
            X-RateLimit-Limit:
              schema:
                type: integer
            X-RateLimit-Remaining:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Too many requests.
                error:
                  status: 429
                  type: ThrottleRequestsException
        '500':
          description: Внутренняя ошибка сервера
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Internal server error.
                error:
                  status: 500
                  type: TransportException

  /api/health:
    get:
      tags: [System]
      summary: Проверить состояние сервиса
      operationId: healthCheck
      responses:
        '200':
          description: Приложение и БД доступны
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                services:
                  application: ok
                  database: ok
                timestamp: '2026-07-17T20:30:59+00:00'
        '503':
          description: База данных недоступна
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: error
                services:
                  application: ok
                  database: unavailable
                timestamp: '2026-07-17T20:30:59+00:00'

  /api/metrics:
    get:
      tags: [System]
      summary: Получить статистику обращений
      operationId: getMetrics
      responses:
        '200':
          description: Текущее количество обращений
          headers:
            X-Request-Id:
              $ref: '#/components/headers/XRequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MetricsResponse'
              example:
                data:
                  metrics:
                    total: 12
                timestamp: '2026-07-17T20:30:59+00:00'

components:
  headers:
    XRequestId:
      description: UUID запроса для корреляции ответа, записи в БД и логов
      schema:
        type: string
        format: uuid

  schemas:
    ContactRequest:
      type: object
      additionalProperties: false
      required: [name, email, phone, comment]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: Иван Петров
        email:
          type: string
          format: email
          maxLength: 254
          example: ivan@example.com
        phone:
          type: string
          minLength: 7
          maxLength: 32
          pattern: '^\+?[0-9\s().-]+$'
          example: '+79991234567'
        comment:
          type: string
          minLength: 5
          maxLength: 3000
          example: Хочу обсудить разработку нового проекта

    ContactCreatedResponse:
      type: object
      required: [message, data]
      properties:
        message:
          type: string
          example: Обращение успешно принято.
        data:
          type: object
          required: [id, request_id, ai]
          properties:
            id:
              type: integer
              minimum: 1
              example: 1
            request_id:
              type: string
              format: uuid
            ai:
              $ref: '#/components/schemas/AiAnalysis'

    AiAnalysis:
      type: object
      required: [answer, category, sentiment, status]
      properties:
        answer:
          type: string
          minLength: 1
          maxLength: 500
          description: AI-ответ или безопасный fallback-текст
        category:
          type: string
          enum: [project, job, consultation, cooperation, spam, other]
        sentiment:
          type: string
          enum: [positive, neutral, negative, unknown]
        status:
          type: string
          enum: [success, fallback]

    HealthResponse:
      type: object
      required: [status, services, timestamp]
      properties:
        status:
          type: string
          enum: [ok, error]
        services:
          type: object
          required: [application, database]
          properties:
            application:
              type: string
              enum: [ok]
            database:
              type: string
              description: Статус БД или краткое описание ошибки
        timestamp:
          type: string
          format: date-time

    MetricsResponse:
      type: object
      required: [data, timestamp]
      properties:
        data:
          type: object
          required: [metrics]
          properties:
            metrics:
              type: object
              required: [total]
              properties:
                total:
                  type: integer
                  minimum: 0
        timestamp:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [message, error]
      properties:
        message:
          type: string
        error:
          type: object
          required: [status, type]
          properties:
            status:
              type: integer
              minimum: 400
              maximum: 599
            type:
              type: string

    ValidationErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ErrorResponse'
        - type: object
          required: [errors]
          properties:
            errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
